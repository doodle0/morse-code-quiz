<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code Trainer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Session Start -->
    <main id="screen-start" class="screen container">
        <article>
            <h1>Morse Code Trainer</h1>
            <section class="settings">
                <fieldset>
                    <legend>Mode</legend>
                    <label>
                        <input type="radio" name="s-mode" id="s-mode-single" value="single" checked>
                        Single-character
                    </label>
                    <label>
                        <input type="radio" name="s-mode" id="s-mode-multi" value="multi">
                        Multi-character
                    </label>
                </fieldset>
                <div class="setting-row" id="s-charsPerQ-row" hidden>
                    <label>Characters per question: <strong id="s-charsPerQVal">2</strong></label>
                    <input type="range" id="s-charsPerQ" min="2" max="10" value="2" step="1">
                </div>
                <div class="setting-row">
                    <label>Questions per session: <strong id="s-questionsVal">10</strong></label>
                    <input type="range" id="s-questions" min="5" max="50" value="10" step="5">
                </div>
                <div class="setting-row">
                    <label>Speed: <strong id="s-wpmVal">5</strong> WPM</label>
                    <input type="range" id="s-wpm" min="5" max="50" value="5" step="1">
                </div>
                <div class="setting-row">
                    <label>Frequency: <strong id="s-freqVal">600</strong> Hz</label>
                    <input type="range" id="s-freq" min="400" max="900" value="600" step="50">
                </div>
                <div class="setting-row">
                    <label>Time limit per character: <strong id="s-timelimitVal">5 s</strong></label>
                    <input type="range" id="s-timelimit" min="0" max="10" value="5" step="0.5">
                </div>
                <fieldset>
                    <legend>Character sets</legend>
                    <label>
                        <input type="checkbox" id="s-letters" role="switch" checked>
                        Letters (A–Z)
                    </label>
                    <label>
                        <input type="checkbox" id="s-digits" role="switch">
                        Digits (0–9)
                    </label>
                </fieldset>
            </section>
            <button id="startSessionBtn" class="btn-primary">Start Session</button>
        </article>
    </main>

    <!-- Quiz -->
    <main id="screen-quiz" class="screen container hidden">
        <article>
            <header class="quiz-header">
                <span>Q <strong id="questionNum">1</strong>/<strong id="questionTotal">10</strong></span>
                <span>Score <strong id="score">0</strong></span>
                <span>Streak <strong id="streak">0</strong></span>
            </header>
            <section>
                <section id="timerBarWrap" class="timer-bar-wrap">
                    <div id="timerBar" class="timer-bar"></div>
                </section>
                <section class="attempts-row">
                    <span class="attempt-dot active" id="dot0"></span>
                    <span class="attempt-dot active" id="dot1"></span>
                    <span class="attempt-dot active" id="dot2"></span>
                </section>
            </section>
            <div class="quiz-body">
                <div id="charBoxes" class="char-boxes" hidden></div>
                <div id="feedback" class="feedback hidden"></div>
                <div class="hint"><small id="hint"></small></div>
            </div>
        </article>
    </main>

    <!-- Session End -->
    <main id="screen-end" class="screen container hidden">
        <article>
            <h2>Session Complete</h2>
            <div id="reportSummary" class="report-summary"></div>
            <table class="report-table">
                <thead>
                    <tr id="reportHead"></tr>
                </thead>
                <tbody id="reportBody"></tbody>
            </table>
            <h3 class="section-heading">By Character</h3>
            <table class="report-table">
                <thead>
                    <tr id="charStatsHead"></tr>
                </thead>
                <tbody id="charStatsBody"></tbody>
            </table>
            <button id="newSessionBtn" class="btn-primary">Start New Session</button>
        </article>
    </main>

    <script src="sound-engine.js"></script>
    <script src="morse-player.js"></script>
    <script src="app.js"></script>
</body>
</html>
